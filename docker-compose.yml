# Brings up backend + ysocket + Postgres talking to each other purely via
# env vars (service names as hostnames), no hardcoded localhost. There's no
# frontend service here at all anymore - this repo is now a headless notes
# collaboration service consumed by helm's frontend (see helm's
# NEXT_PUBLIC_NOTES_BACKEND_URL / NEXT_PUBLIC_NOTES_WS_URL, pointed at
# localhost:3000 / localhost:1234 for local dev against this compose file).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: livecode
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/livecode
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-livecode-dev-stub-internal-key}
      PORT: 8080
    ports:
      - "3000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ysocket:
    build: ./ysocket
    environment:
      BACKEND_URL: http://backend:8080
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-livecode-dev-stub}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-livecode-dev-stub-internal-key}
      PORT: 8080
      HOST: 0.0.0.0
    ports:
      - "1234:8080"
    depends_on:
      - backend

volumes:
  postgres-data:
