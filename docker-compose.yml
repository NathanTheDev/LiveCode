# GH issue #2 Phase 5: brings up backend + ysocket + Postgres talking to each
# other purely via env vars (service names as hostnames), no hardcoded
# localhost. The frontend isn't containerized here - it deploys to
# Cloudflare Pages as a static build (Phase 6), not Fly.io/Docker; run it
# locally with `npm run dev` pointed at these via frontend/.env
# (VITE_BACKEND_URL=http://localhost:3000, VITE_WS_URL=ws://localhost:1234).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: livecode
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/livecode
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-livecode-dev-stub}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PORT: 8080
    ports:
      - "3000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  ysocket:
    build: ./ysocket
    environment:
      BACKEND_URL: http://backend:8080
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-livecode-dev-stub}
      PORT: 8080
      HOST: 0.0.0.0
    ports:
      - "1234:8080"
    depends_on:
      - backend

volumes:
  postgres-data:
